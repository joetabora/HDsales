services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: forge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge_dev_password
      POSTGRES_DB: forge
    ports:
      - "5432:5432"
    volumes:
      - forge_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d forge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: forge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - forge_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: forge-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://forge:forge_dev_password@postgres:5432/forge
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-forge-dev-secret-change-in-production-min-32-chars}
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      AI_PROVIDER: dev
      STORAGE_PROVIDER: local
      MESSAGING_PROVIDER: dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - forge_uploads:/app/uploads

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: forge-worker
    restart: unless-stopped
    command: ["npm", "run", "worker"]
    environment:
      DATABASE_URL: postgresql://forge:forge_dev_password@postgres:5432/forge
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-forge-dev-secret-change-in-production-min-32-chars}
      AI_PROVIDER: dev
      STORAGE_PROVIDER: local
      MESSAGING_PROVIDER: dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - forge_uploads:/app/uploads

volumes:
  forge_postgres_data:
  forge_redis_data:
  forge_uploads:
